version: "3.6"

services:
  auth-api:
    image: micro5/auth-api
    build: ./auth-api/auth-api
    hostname: auth-api
    container_name: auth-api
    ports:
      - "8081:8081"
    environment:
      - AUTH_API_PORT=8081
      - JWT_SECRET=myfancysecret
      - USERS_API_ADDRESS=http://users-api:8083
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans

  front:
    image: micro5/front
    hostname: front
    build: ./front/frontend
    container_name: front
    ports:
      - "8080:80"
    environment:
      - AUTH_API_ADDRESS=http://localhost:8081
      - PORT=8080
      - TODOS_API_ADDRESS=http://localhost:8082
      - ZIPKIN_URL=http://localhost:9411/api/v2/spans

  log-message-processor:
    image: micro5/log-message-processor
    build: ./log-message-processor/log-message-processor
    hostname: log-message-processor
    container_name: log-message-processor
    ## ports:
    ##  - "8083:8083"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CHANNEL=log_channel
      - ZIPKIN_URL=http://zipkin:9411/api/v1/spans

  todos-api:
    image: micro5/todos-api
    build: ./todos-api/todos-api
    hostname: todos-api
    container_name: todos-api
    ports:
      - "8082:8082"
    environment:
      - JWT_SECRET=myfancysecret
      - TODO_API_PORT=8082
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_CHANNEL=log_channel
      - ZIPKIN_URL=http://zipkin:9411/api/v2/spans

  users-api:
    image: micro5/users-api
    build: ./users-api/users-api
    hostname: users-api
    container_name: users-api
    ports:
      - "8083:8083"
    environment:
      - JWT_SECRET=myfancysecret
      - SERVER_PORT=8083
      - SPRING_ZIPKIN_BASE_URL=http://zipkin:9411

      ############ INFRA #############

  zipkin:
    image: openzipkin/zipkin
    ports:
      - 9411:9411
    container_name: zipkin

  redis:
    image: redis
    ports:
      - 6379:6379
    container_name: redis
